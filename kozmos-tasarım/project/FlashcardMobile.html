<script type="text/babel">

    accentLight: '#FEF3C7',
    success: '#34D399',
    successBg: '#ECFDF5',
    warning: '#FBBF24',
    warningBg: '#FFFBEB',
    danger: '#EF4444',
    dangerBg: '#FEF2F2',

    textMuted: '#9CA3AF',

// ── MASCOT ──
function Mascot({ theme, size = 48, expression = 'happy', style = {} }) {
  const t = themes[theme];
  const s = size;
  return (
    <div style={{ width: s, height: s, position: 'relative', ...style }}>
      <svg viewBox="0 0 48 48" width={s} height={s}>
        {/* body */}
        <rect x="8" y="10" width="32" height="28" rx="10" fill={t.mascotColor}/>
        {/* eyes */}
        {expression === 'happy' ? (
          <>
            <ellipse cx="18" cy="24" rx="3" ry="3.5" fill="white"/>
            <ellipse cx="30" cy="24" rx="3" ry="3.5" fill="white"/>
            <circle cx="18" cy="24.5" r="1.8" fill="#1a1a2e"/>
            <circle cx="30" cy="24.5" r="1.8" fill="#1a1a2e"/>
            <ellipse cx="19" cy="23" rx="0.8" ry="0.6" fill="white"/>
            <ellipse cx="31" cy="23" rx="0.8" ry="0.6" fill="white"/>
          </>
        ) : expression === 'thinking' ? (
          <>
            <ellipse cx="18" cy="24" rx="3" ry="3.5" fill="white"/>
            <ellipse cx="30" cy="24" rx="3" ry="3.5" fill="white"/>
            <circle cx="17" cy="24.5" r="1.8" fill="#1a1a2e"/>
            <circle cx="29" cy="24.5" r="1.8" fill="#1a1a2e"/>
          </>
        ) : (
          <>
            <path d="M15 23 Q18 21 21 23" stroke="white" strokeWidth="2" fill="none" strokeLinecap="round"/>
            <path d="M27 23 Q30 21 33 23" stroke="white" strokeWidth="2" fill="none" strokeLinecap="round"/>
          </>
        )}
        {/* mouth */}
        {expression === 'happy' && <path d="M20 30 Q24 34 28 30" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/>}
        {expression === 'thinking' && <circle cx="32" cy="30" r="2" fill={t.mascotAccent}/>}
        {expression === 'celebrate' && <path d="M18 29 Q24 35 30 29" stroke="white" strokeWidth="2" fill="none" strokeLinecap="round"/>}
        {/* cheeks */}
        <circle cx="13" cy="28" r="2.5" fill={t.mascotAccent} opacity="0.4"/>
        <circle cx="35" cy="28" r="2.5" fill={t.mascotAccent} opacity="0.4"/>
        {/* hat/accessory */}
        <rect x="16" y="6" width="16" height="6" rx="3" fill={t.mascotAccent}/>
        <circle cx="24" cy="6" r="2.5" fill={t.mascotAccent}/>
      </svg>
    </div>
  );
}

// ── TAB BAR ──
function TabBar({ theme, active, onNav }) {
  const t = themes[theme];
  const tabs = [
    { id: 'home', label: 'Anasayfa', icon: (c) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1v-9.5z" stroke={c} strokeWidth="2" strokeLinejoin="round"/><rect x="9" y="14" width="6" height="7" rx="1" stroke={c} strokeWidth="2"/></svg> },
    { id: 'study', label: 'Çalış', icon: (c) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke={c} strokeWidth="2"/><path d="M12 3v18M4 12h16" stroke={c} strokeWidth="2"/></svg> },
    { id: 'create', label: 'Oluştur', icon: (c) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={c} strokeWidth="2"/><path d="M12 8v8M8 12h8" stroke={c} strokeWidth="2" strokeLinecap="round"/></svg> },
    { id: 'profile', label: 'Profil', icon: (c) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke={c} strokeWidth="2"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke={c} strokeWidth="2" strokeLinecap="round"/></svg> },
  ];
  return (
    <div style={{
      display:'flex', background: t.tabBar, borderTop:`1px solid ${t.border}`,
      padding:'6px 0 22px', position:'absolute', bottom:0, left:0, right:0, zIndex:20,
    }}>
      {tabs.map(tab => (
        <div key={tab.id} onClick={() => onNav(tab.id)} style={{
          flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2,
          cursor:'pointer', opacity: active === tab.id ? 1 : 0.5,
          transition:'opacity 0.2s',
        }}>
          {tab.icon(active === tab.id ? t.tabActive : t.tabInactive)}
          <span style={{ fontSize:10, fontWeight:600, color: active === tab.id ? t.tabActive : t.tabInactive }}>{tab.label}</span>
        </div>
      ))}
    </div>
  );
}

    {en:'Please',tr:'Lütfen',pron:'/pliːz/'},{en:'Goodbye',tr:'Hoşça kal',pron:'/ɡʊdˈbaɪ/'},
    {en:'Water',tr:'Su',pron:'/ˈwɔːtər/'},{en:'Food',tr:'Yemek',pron:'/fuːd/'},
    {en:'Friend',tr:'Arkadaş',pron:'/frend/'},{en:'Family',tr:'Aile',pron:'/ˈfæməli/'},
  ]},
  { id:'colors', name:'Renkler', emoji:'🎨', count:12, words:[
    {en:'Red',tr:'Kırmızı',pron:'/red/'},{en:'Blue',tr:'Mavi',pron:'/bluː/'},
    {en:'Green',tr:'Yeşil',pron:'/ɡriːn/'},{en:'Yellow',tr:'Sarı',pron:'/ˈjeloʊ/'},
  ]},
  { id:'numbers', name:'Sayılar', emoji:'🔢', count:20, words:[] },
  { id:'travel', name:'Seyahat', emoji:'✈️', count:35, words:[] },
  { id:'business', name:'İş İngilizcesi', emoji:'💼', count:40, words:[] },

// ── HOME SCREEN ──

  const t = themes[theme];
  const streak = 7;
  const dailyProgress = 0.6;
  return (
    <div style={{ background: t.bg, minHeight:'100%', paddingBottom:90 }}>

      <div style={{ padding:'60px 20px 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>

          <div style={{ fontSize:26, fontWeight:700, color:t.text, fontFamily:"'Instrument Serif', serif", fontStyle:'italic' }}>Bugün ne öğrenelim?</div>
        </div>
        <Mascot theme={theme} size={44} expression="happy"/>
      </div>

      {/* Streak + Daily Goal */}
      <div style={{ padding:'0 20px', display:'flex', gap:12 }}>

          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ flex:1, height:8, background:t.primaryLight, borderRadius:99, overflow:'hidden' }}>
              <div style={{ width:`${dailyProgress*100}%`, height:'100%', background:t.gradient, borderRadius:99, transition:'width 0.6s ease' }}/>
            </div>
            <span style={{ fontSize:13, fontWeight:600, color:t.primary }}>{Math.round(dailyProgress*100)}%</span>
          </div>
          <div style={{ fontSize:11, color:t.textSecondary, marginTop:4 }}>6/10 kelime</div>
        </div>
      </div>

      {/* Daily Challenge */}
      <div style={{ padding:'16px 20px 0' }}>
        <div style={{
          background: t.cardGradient, borderRadius:20, padding:'18px 20px',
          color:'white', position:'relative', overflow:'hidden',
        }}>
          <div style={{ position:'absolute', top:-20, right:-20, width:80, height:80, borderRadius:'50%', background:'rgba(255,255,255,0.1)' }}/>
          <div style={{ position:'absolute', bottom:-30, right:20, width:60, height:60, borderRadius:'50%', background:'rgba(255,255,255,0.08)' }}/>
          <div style={{ fontSize:11, fontWeight:600, opacity:0.8, letterSpacing:1, marginBottom:6 }}>GÜNÜN MEYDAN OKUMASI</div>
          <div style={{ fontSize:18, fontWeight:700, marginBottom:4 }}>5 Yeni Kelime Öğren</div>
          <div style={{ fontSize:13, opacity:0.85, marginBottom:12 }}>2 dakikanda tamamla, rozetini kazan!</div>
          <div onClick={() => onNav('study')} style={{

}

// ── FLASHCARD STUDY SCREEN ──
function StudyScreen({ theme, onNav }) {
  const t = themes[theme];
  const words = wordLists[0].words;
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [rated, setRated] = React.useState(false);
  const [exitDir, setExitDir] = React.useState(null);

  const word = words[idx % words.length];

  const handleFlip = () => { if(!rated) setFlipped(!flipped); };
  const handleRate = (level) => {
    setRated(true);
    setExitDir(level >= 2 ? 'right' : 'left');
    setTimeout(() => {
      setIdx(i => i+1);
      setFlipped(false);
      setRated(false);
      setExitDir(null);
    }, 350);
  };

  const ratings = [
    { label:'Tekrar', emoji:'🔄', color:t.danger, bg:t.dangerBg, level:0 },
    { label:'Zor', emoji:'😓', color:t.warning, bg:t.warningBg, level:1 },
    { label:'İyi', emoji:'👍', color:t.primary, bg:t.primaryLight, level:2 },
    { label:'Kolay', emoji:'⚡', color:t.success, bg:t.successBg, level:3 },
  ];

  return (
    <div style={{ background:t.bg, minHeight:'100%', paddingBottom:90, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'60px 20px 12px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div onClick={() => onNav('home')} style={{ cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
          <svg width="10" height="16" viewBox="0 0 8 14"><path d="M7 1L1 7l6 6" stroke={t.text} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          <span style={{ fontSize:16, fontWeight:600, color:t.text }}>Günlük İngilizce</span>
        </div>
        <span style={{ fontSize:13, color:t.textMuted, fontWeight:600 }}>{idx+1}/{words.length}</span>
      </div>

      {/* Progress bar */}
      <div style={{ padding:'0 20px', marginBottom:20 }}>
        <div style={{ height:4, background:t.primaryLight, borderRadius:99, overflow:'hidden' }}>
          <div style={{ width:`${((idx)/words.length)*100}%`, height:'100%', background:t.gradient, borderRadius:99, transition:'width 0.4s ease' }}/>
        </div>
      </div>

      {/* Card */}
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'0 24px' }}>
        <div onClick={handleFlip} style={{
          width:'100%', maxWidth:340, height:240, perspective:1000, cursor:'pointer',
          transform: exitDir === 'right' ? 'translateX(120%) rotate(8deg)' : exitDir === 'left' ? 'translateX(-120%) rotate(-8deg)' : 'none',
          opacity: exitDir ? 0 : 1,
          transition: exitDir ? 'transform 0.35s ease, opacity 0.35s ease' : 'none',
        }}>
          <div style={{
            width:'100%', height:'100%', position:'relative',
            transformStyle:'preserve-3d',
            transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)',
            transition:'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)',
          }}>
            {/* Front */}
            <div style={{
              position:'absolute', inset:0, backfaceVisibility:'hidden',
              background: t.cardGradient, borderRadius:24, padding:24,
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
              color:'white', boxShadow:'0 8px 32px rgba(0,0,0,0.12)',
            }}>
              <div style={{ position:'absolute', top:16, right:16, fontSize:11, opacity:0.7, background:'rgba(255,255,255,0.2)', borderRadius:99, padding:'4px 10px' }}>
                Dokun → çevir
              </div>
              <div style={{ fontSize:36, fontWeight:700, marginBottom:8, fontFamily:"'Instrument Serif', serif" }}>{word.en}</div>
              <div style={{ fontSize:14, opacity:0.8 }}>{word.pron}</div>
              <div style={{ marginTop:16, display:'flex', alignItems:'center', gap:6, opacity:0.7 }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 3v18M3 12l4 4 5-5M17 7l-5 5 4 4"/></svg>
                <span style={{ fontSize:12 }}>🔊 Telaffuz</span>
              </div>
            </div>
            {/* Back */}
            <div style={{
              position:'absolute', inset:0, backfaceVisibility:'hidden',
              transform:'rotateY(180deg)',
              background: t.card, borderRadius:24, padding:24,
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
              boxShadow:'0 8px 32px rgba(0,0,0,0.12)', border:`2px solid ${t.primary}`,
            }}>
              <div style={{ fontSize:14, color:t.textMuted, marginBottom:4 }}>Türkçe</div>
              <div style={{ fontSize:32, fontWeight:700, color:t.text, fontFamily:"'Instrument Serif', serif" }}>{word.tr}</div>
              <div style={{ marginTop:16, fontSize:14, color:t.textSecondary }}>
                <span style={{ fontWeight:600, color:t.primary }}>{word.en}</span> — {word.pron}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Mascot hint */}
      <div style={{ display:'flex', justifyContent:'center', marginTop:12, marginBottom:8 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, background:t.card, borderRadius:99, padding:'6px 14px 6px 8px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
          <Mascot theme={theme} size={24} expression={flipped ? 'celebrate' : 'thinking'}/>
          <span style={{ fontSize:12, color:t.textSecondary }}>{flipped ? 'Nasıldı? Değerlendir 👇' : 'Kartı çevirmek için dokun'}</span>
        </div>
      </div>

      {/* Rating buttons */}
      {flipped && !rated && (
        <div style={{ padding:'0 20px 20px', display:'flex', gap:8, animation:'slideUp 0.3s ease' }}>
          {ratings.map(r => (
            <div key={r.level} onClick={() => handleRate(r.level)} style={{
              flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4,
              padding:'12px 4px', borderRadius:14, background:r.bg, cursor:'pointer',
              border:`1.5px solid transparent`, transition:'border-color 0.15s, transform 0.1s',
            }}
            onMouseDown={e => e.currentTarget.style.transform='scale(0.95)'}
            onMouseUp={e => e.currentTarget.style.transform='scale(1)'}
            >
              <span style={{ fontSize:20 }}>{r.emoji}</span>
              <span style={{ fontSize:11, fontWeight:600, color:r.color }}>{r.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const [words, setWords] = React.useState([{en:'',tr:''},{en:'',tr:''}]);

  const addWord = () => setWords(w => [...w, {en:'',tr:''}]);

  return (

      <div style={{ padding:'60px 20px 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div onClick={() => onNav('home')} style={{ cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
          <svg width="10" height="16" viewBox="0 0 8 14"><path d="M7 1L1 7l6 6" stroke={t.text} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          <span style={{ fontSize:16, fontWeight:600, color:t.text }}>İptal</span>
        </div>
        <span style={{ fontSize:18, fontWeight:700, color:t.text }}>Yeni Liste</span>
        <div style={{
          background: listName ? t.primary : t.border, borderRadius:99, padding:'8px 16px',
          fontSize:14, fontWeight:600, color: listName ? 'white' : t.textMuted, cursor: listName ? 'pointer' : 'default',
          transition:'background 0.2s',
        }}>Kaydet</div>
      </div>

      {/* Form */}
      <div style={{ padding:'0 20px' }}>
        {/* List name */}
        <div style={{
          background:t.card, borderRadius:16, padding:'16px', marginBottom:16,
          boxShadow:'0 2px 8px rgba(0,0,0,0.04)', border:`1px solid ${t.border}`,
        }}>
          <div style={{ fontSize:12, fontWeight:600, color:t.textMuted, marginBottom:8, letterSpacing:0.5 }}>LİSTE ADI</div>
          <input
            value={listName} onChange={e => setListName(e.target.value)}
            placeholder="Örn: Seyahat kelimeleri"
            style={{
              width:'100%', border:'none', outline:'none', fontSize:17, fontWeight:600,
              color:t.text, background:'transparent', fontFamily:'DM Sans',
              borderBottom:`2px solid ${listName ? t.primary : t.border}`,
              paddingBottom:8, transition:'border-color 0.2s',
            }}
          />
        </div>

        {/* Mascot tip */}
        <div style={{
          display:'flex', alignItems:'center', gap:10, background:t.primaryLight,
          borderRadius:14, padding:'12px 14px', marginBottom:16,
        }}>
          <Mascot theme={theme} size={32} expression="happy"/>
          <div style={{ fontSize:13, color:t.text, lineHeight:1.4 }}>
            <strong>İpucu:</strong> En az 5 kelime ekle, çalışma daha verimli olsun!
          </div>
        </div>

        {/* Words */}
        <div style={{ fontSize:12, fontWeight:600, color:t.textMuted, marginBottom:10, letterSpacing:0.5 }}>KELİMELER ({words.length})</div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {words.map((w,i) => (
            <div key={i} style={{
              background:t.card, borderRadius:14, padding:'12px 14px',
              display:'flex', gap:10, alignItems:'center',
              boxShadow:'0 1px 4px rgba(0,0,0,0.04)', border:`1px solid ${t.border}`,
              animation:`fadeUp 0.2s ease ${i*0.05}s both`,
            }}>
              <div style={{
                width:28, height:28, borderRadius:8, background:t.primaryLight,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:12, fontWeight:700, color:t.primary,
              }}>{i+1}</div>
              <div style={{ flex:1, display:'flex', flexDirection:'column', gap:6 }}>
                <input placeholder="İngilizce" style={{
                  border:'none', outline:'none', fontSize:15, fontWeight:600,
                  color:t.text, background:'transparent', fontFamily:'DM Sans',
                }}/>
                <input placeholder="Türkçe" style={{
                  border:'none', outline:'none', fontSize:13, color:t.textSecondary,
                  background:'transparent', fontFamily:'DM Sans',
                }}/>
              </div>
            </div>
          ))}
        </div>

        {/* Add word button */}
        <div onClick={addWord} style={{
          marginTop:12, display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          padding:'14px', borderRadius:14, border:`2px dashed ${t.border}`,
          cursor:'pointer', color:t.primary, fontSize:14, fontWeight:600,
          transition:'border-color 0.2s, background 0.2s',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke={t.primary} strokeWidth="2"/>
            <path d="M12 8v8M8 12h8" stroke={t.primary} strokeWidth="2" strokeLinecap="round"/>
          </svg>
          Kelime Ekle
        </div>

        {/* Public toggle */}
        <div style={{
          marginTop:16, background:t.card, borderRadius:14, padding:'14px 16px',
          display:'flex', alignItems:'center', justifyContent:'space-between',
          boxShadow:'0 1px 4px rgba(0,0,0,0.04)', border:`1px solid ${t.border}`,
        }}>
          <div>
            <div style={{ fontSize:15, fontWeight:600, color:t.text }}>Herkese Açık</div>
            <div style={{ fontSize:12, color:t.textMuted }}>Başkaları listeyi görebilir</div>
          </div>
          <div onClick={() => setIsPublic(!isPublic)} style={{
            width:50, height:28, borderRadius:99, cursor:'pointer',
            background: isPublic ? t.primary : '#D1D5DB',
            transition:'background 0.25s', position:'relative',
          }}>
            <div style={{
              width:24, height:24, borderRadius:'50%', background:'white',
              position:'absolute', top:2, left: isPublic ? 24 : 2,
              transition:'left 0.25s cubic-bezier(0.4, 0, 0.2, 1)',
              boxShadow:'0 1px 3px rgba(0,0,0,0.15)',
            }}/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP WRAPPER ──
function FlashcardApp({ theme }) {
  const [screen, setScreen] = React.useState('home');
  const t = themes[theme];
  return (
    <IOSDevice width={393} height={852}>
      <div style={{ height:'100%', position:'relative', background:t.bg }}>
        {screen === 'home' && <HomeScreen theme={theme} onNav={setScreen}/>}
        {screen === 'study' && <StudyScreen theme={theme} onNav={setScreen}/>}
        {screen === 'create' && <CreateScreen theme={theme} onNav={setScreen}/>}
        <TabBar theme={theme} active={screen === 'study' ? 'study' : screen === 'create' ? 'create' : 'home'} onNav={setScreen}/>
      </div>
    </IOSDevice>
  );
}

// ── MAIN ──
function App() {
  return (
    <DesignCanvas>
      <DCSection id="variants" title="FlashcardMobile — 2 Renk Yönü" subtitle="İndigo Gece vs Okyanus Teal · Etkileşimli prototip">
        <DCArtboard id="indigo" label="A · İndigo Gece" width={393} height={852}>
          <FlashcardApp theme="indigo"/>
        </DCArtboard>
        <DCArtboard id="teal" label="B · Okyanus Teal" width={393} height={852}>
          <FlashcardApp theme="teal"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// Tweaks
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') {
    document.getElementById('tweaks-panel').style.display = 'block';
  }
  if (e.data?.type === '__deactivate_edit_mode') {
    document.getElementById('tweaks-panel').style.display = 'none';
  }
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>
